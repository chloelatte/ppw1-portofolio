<!DOCTYPE html>
<html>
<head>
<title>Form Pendaftaran Les Ruangguru</title>
</head>

<body style="background-color: #CAF0F8;">


<center>
<img src="https://hybrid.co.id/wp-content/uploads/2018/07/8487863035f9c1a2bf9a4103587911d4_webbanner-bimbel.jpg" width="400">
<h2 style="color: #051094">Form Pendaftaran Les Online Ruangguru</h2>
</center>

<form>

<fieldset>
<legend>Data Siswa</legend>

<label for="nama">Nama Lengkap:</label><br>
<input type="text" id="nama" name="nama"><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email"><br><br>

<label for="kelas">Kelas:</label><br>
<select id="kelas" name="kelas">
<option value="sd">SD</option>
<option value="smp">SMP</option>
<option value="sma">SMA</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Pilihan Mata Pelajaran</legend>

<input type="checkbox" name="mapel" value="Matematika"> Matematika<br>
<input type="checkbox" name="mapel" value="Bahasa Inggris"> Bahasa Inggris<br>
<input type="checkbox" name="mapel" value="Fisika"> Fisika<br>
<input type="checkbox" name="mapel" value="Kimia"> Kimia

</fieldset>

<br>

<fieldset>
<legend>Metode Belajar</legend>

<input type="radio" name="metode" value="Live Class"> Live Class<br>
<input type="radio" name="metode" value="Video Belajar"> Video Belajar

</fieldset>

<br>

<center>
<img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/e149ecd8-25c4-4e16-a691-fd0d8d20d60c.png" width="500">
</center>
<br>
<label>Komentar atau Pertanyaan:</label><br>
<textarea rows="4" cols="40"></textarea>
<br>
<br>

<input type="submit" value="Daftar">
<input type="reset" value="Reset">

</form>

</body>
</html>
